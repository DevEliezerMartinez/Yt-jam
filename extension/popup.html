<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Jam</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid #272727;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #ff0000;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .header-text p {
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }

    .video-info {
      padding: 14px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #272727;
    }

    .video-title {
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-id {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      font-family: monospace;
    }

    .no-video {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
    }

    .actions {
      padding: 14px 16px;
    }

    .btn-add {
      width: 100%;
      padding: 10px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-add:hover:not(:disabled) { background: #cc0000; }
    .btn-add:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .status.success {
      display: block;
      background: #0d3320;
      color: #4ade80;
      border: 1px solid #166534;
    }

    .status.error {
      display: block;
      background: #3b0808;
      color: #f87171;
      border: 1px solid #7f1d1d;
    }

    .status.loading {
      display: block;
      background: #1c1c1c;
      color: #aaa;
      border: 1px solid #333;
    }

    .footer {
      padding: 8px 16px 12px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">▶</div>
    <div class="header-text">
      <h1>YT Jam</h1>
      <p>Playlist de la oficina</p>
    </div>
  </div>

  <div class="video-info" id="video-section">
    <div class="no-video" id="no-video">
      Abre un video de YouTube para poder agregarlo.
    </div>
    <div id="video-data" style="display:none">
      <div class="video-title" id="video-title">—</div>
      <div class="video-id" id="video-id">—</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-add" id="btn-add" disabled>
      <span>＋</span> Agregar a la cola
    </button>
    <div class="status" id="status"></div>
  </div>

  <div class="footer">Conectado a la playlist de la oficina</div>

  <script src="popup.js"></script>
</body>
</html>
